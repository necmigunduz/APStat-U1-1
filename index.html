<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Statistics — Graphs & Data Analysis Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ffffff; --surface:#f6f8fa; --card:#ffffff; --border:#d0d7de;
  --accent:#953a00; --accent2:#0969da; --green:#1a7f37; --red:#cf222e;
  --purple:#6639ba; --text:#1f2328; --muted:#636c76; --label:#24292f;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Source Serif 4',Georgia,serif;font-weight:300;min-height:100vh;}

header{background:linear-gradient(135deg,#f0f4ff 0%,#ffffff 50%,#f0f4ff 100%);border-bottom:1px solid var(--border);padding:2.5rem 2rem 2rem;text-align:center;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% -20%,rgba(149,58,0,0.06),transparent);pointer-events:none;}
.header-tag{font-size:0.72rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent);margin-bottom:0.6rem;}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:700;color:var(--text);letter-spacing:-0.02em;line-height:1.1;}
header h1 span{color:var(--accent);}
.header-sub{margin-top:0.7rem;color:var(--muted);font-size:0.95rem;}

.progress-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:0.9rem 2rem;display:flex;align-items:center;gap:1.2rem;position:sticky;top:0;z-index:100;}
.progress-bar{flex:1;height:5px;background:var(--border);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:99px;transition:width 0.4s ease;width:0%;}
.progress-text{font-size:0.82rem;color:var(--muted);white-space:nowrap;min-width:90px;text-align:right;}
.score-pill{font-size:0.82rem;font-weight:600;color:var(--accent);background:rgba(232,168,56,0.12);border:1px solid rgba(232,168,56,0.25);border-radius:99px;padding:0.2rem 0.8rem;white-space:nowrap;}

main{max-width:960px;margin:0 auto;padding:2.5rem 1.5rem 4rem;display:flex;flex-direction:column;gap:2rem;}

/* Section headers */
.section-header{display:flex;align-items:center;gap:1rem;padding:1rem 0 0.3rem;border-bottom:2px solid var(--border);margin-bottom:0.5rem;}
.section-header h2{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--accent);}
.section-header p{color:var(--muted);font-size:0.88rem;}

/* MC card */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color 0.3s;}
.q-card.answered-correct{border-color:var(--green);}
.q-card.answered-wrong{border-color:var(--red);}
.q-header{display:flex;align-items:center;gap:1rem;padding:1rem 1.4rem;border-bottom:1px solid var(--border);background:var(--surface);}
.q-num{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--accent);min-width:2rem;}
.q-badge{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:0.18rem 0.7rem;}
.q-status{margin-left:auto;font-size:1.1rem;opacity:0;transition:opacity 0.3s;}
.q-card.answered-correct .q-status,.q-card.answered-wrong .q-status{opacity:1;}
.q-graph{padding:1.2rem 1.4rem 0;}
.q-graph img{width:100%;border-radius:10px;border:1px solid var(--border);display:block;}
.q-body{padding:1.1rem 1.4rem 0.7rem;}
.q-stem{font-size:0.95rem;color:var(--text);line-height:1.6;margin-bottom:0.65rem;font-style:italic;}
.q-question{font-size:1.03rem;font-weight:600;color:var(--text);line-height:1.55;}
.choices{padding:0.4rem 1.4rem 1.3rem;display:flex;flex-direction:column;gap:0.5rem;}
.choice{display:flex;align-items:flex-start;gap:0.85rem;padding:0.7rem 1rem;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:background 0.18s,border-color 0.18s,transform 0.12s;font-size:0.94rem;line-height:1.5;color:var(--label);user-select:none;}
.choice:hover:not(.disabled){background:rgba(91,141,238,0.1);border-color:var(--accent2);color:var(--text);transform:translateX(3px);}
.choice-letter{font-family:'Playfair Display',serif;font-weight:700;font-size:0.87rem;color:var(--accent2);min-width:1.2rem;padding-top:0.05rem;}
.choice.correct{background:rgba(62,207,142,0.12);border-color:var(--green);color:var(--text);}
.choice.correct .choice-letter{color:var(--green);}
.choice.wrong{background:rgba(240,96,96,0.12);border-color:var(--red);color:var(--text);}
.choice.wrong .choice-letter{color:var(--red);}
.choice.disabled{cursor:default;pointer-events:none;}
.choice.reveal-correct{background:rgba(62,207,142,0.07);border-color:rgba(62,207,142,0.4);color:var(--muted);}
.explanation{margin:0 1.4rem 1.3rem;padding:0.85rem 1rem;border-radius:10px;border-left:3px solid var(--green);background:rgba(62,207,142,0.06);font-size:0.88rem;color:var(--label);line-height:1.6;display:none;}
.explanation.wrong-exp{border-color:var(--red);background:rgba(240,96,96,0.06);}
.explanation strong{color:var(--text);}

/* Extra graph below choices (for Q7/Q8) */
.extra-graph{padding:0 1.4rem 1.3rem;}
.extra-graph img{width:100%;border-radius:10px;border:1px solid var(--border);display:block;}
.extra-graph-label{font-size:0.8rem;color:var(--muted);text-align:center;margin-top:0.4rem;font-style:italic;}

/* FR card */
.fr-card{background:var(--card);border:2px solid var(--purple);border-radius:16px;overflow:hidden;}
.fr-header{padding:1rem 1.4rem;border-bottom:1px solid var(--border);background:rgba(167,139,250,0.06);display:flex;align-items:center;gap:0.8rem;}
.fr-header h3{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--purple);}
.fr-badge{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--purple);background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.3);border-radius:99px;padding:0.18rem 0.7rem;}
.fr-graph{padding:1.2rem 1.4rem 0;}
.fr-graph img{width:100%;border-radius:10px;border:1px solid var(--border);display:block;margin-bottom:0.8rem;}
.fr-body{padding:1rem 1.4rem;}
.fr-context{font-size:0.92rem;color:var(--text);line-height:1.6;margin-bottom:1rem;font-style:italic;}
.fr-table{width:100%;border-collapse:collapse;margin-bottom:1.2rem;font-size:0.9rem;}
.fr-table th{background:rgba(167,139,250,0.12);color:var(--purple);padding:0.5rem 0.8rem;text-align:center;border:1px solid var(--border);font-weight:600;}
.fr-table td{padding:0.45rem 0.8rem;text-align:center;border:1px solid var(--border);color:var(--label);}
.fr-parts{display:flex;flex-direction:column;gap:0.8rem;padding:0 1.4rem 1.4rem;}
.fr-part{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.85rem 1rem;}
.fr-part-label{font-family:'Playfair Display',serif;font-weight:700;color:var(--purple);font-size:0.95rem;margin-bottom:0.35rem;}
.fr-part-q{font-size:0.95rem;color:var(--text);line-height:1.55;}
.fr-answer{margin-top:0.6rem;padding:0.7rem 0.9rem;background:rgba(62,207,142,0.07);border-left:3px solid var(--green);border-radius:0 8px 8px 0;font-size:0.88rem;color:var(--label);line-height:1.6;display:none;}
.fr-answer strong{color:var(--text);}
.show-answer-btn{margin-top:0.5rem;padding:0.35rem 1rem;border-radius:99px;border:1px solid var(--green);background:transparent;color:var(--green);font-family:'Source Serif 4',serif;font-size:0.82rem;cursor:pointer;transition:background 0.18s,color 0.18s;}
.show-answer-btn:hover{background:rgba(62,207,142,0.12);}

/* Results */
#results{display:none;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;text-align:center;}
#results h2{font-family:'Playfair Display',serif;font-size:2rem;color:var(--accent);margin-bottom:0.4rem;}
.score-big{font-size:3.5rem;font-family:'Playfair Display',serif;font-weight:700;color:var(--text);line-height:1;margin:0.8rem 0;}
#results p{color:var(--muted);font-size:1rem;margin-bottom:0.3rem;}
.btn-reset{margin-top:1.4rem;padding:0.75rem 2.2rem;border-radius:99px;border:none;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;font-family:'Source Serif 4',serif;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity 0.2s,transform 0.15s;}
.btn-reset:hover{opacity:0.88;transform:translateY(-2px);}
</style>
</head>

const MC = [{"num": 1, "graph": null, "stem": "Data were collected on 80 athletes. Two variables recorded were dominant hand (left or right) and sprint time in seconds.", "question": "Are these variables categorical or quantitative?", "choices": ["Both are categorical.", "Both are quantitative.", "Dominant hand is categorical and sprint time is quantitative.", "Dominant hand is quantitative and sprint time is categorical.", "This cannot be answered without further information."], "answer": 2, "explanation": "Dominant hand is a category (left/right) \u2014 categorical. Sprint time is a measured number \u2014 quantitative."}, {"num": 2, "graph": "mc_q2_histogram.png", "stem": "The times, in minutes, taken by 140 high school students to complete a level of a video game are summarized in the histogram above.", "question": "Based on the histogram, which of the following must be true?", "choices": ["The minimum time taken was exactly 0 minutes.", "The maximum time taken was exactly 30 minutes.", "If the times are arranged in order, the middle time would be between 10 and 15 minutes.", "If the times are arranged in order, the middle time would be between 15 and 20 minutes.", "The same number of students took less than 10 minutes as took over 25 minutes."], "answer": 3, "explanation": "Cumulative counts: 0\u20135: 4, 0\u201310: 22, 0\u201315: 64, 0\u201320: 102. The 70th value (median) falls in the 15\u201320 bin. Answer: D."}, {"num": 3, "graph": null, "stem": "", "question": "Which of the following is a TRUE statement about stemplots?", "choices": ["Stemplots are useful for both quantitative and categorical data sets.", "Stemplots are equally useful for small and very large data sets.", "Stemplots can show symmetry, gaps, clusters, and outliers.", "Stemplots may or may not show individual values.", "Stems may be skipped if there is no data value for a particular stem."], "answer": 2, "explanation": "Stemplots preserve individual values and reveal shape, gaps, clusters, and outliers. They work only for quantitative data and become unwieldy with very large datasets. Stems must never be skipped."}, {"num": 4, "graph": null, "stem": "", "question": "Which of the following is an INCORRECT statement about histograms?", "choices": ["In histograms, relative areas correspond to relative frequencies.", "In histograms, frequencies can be determined from relative heights alone regardless of bin width.", "Symmetric histograms may have multiple peaks.", "Two students working with the same data may produce histograms that look different.", "Displaying outliers may be more problematic when using histograms than when using stemplots."], "answer": 1, "explanation": "Frequency is determined by area (height \u00d7 width), not height alone. If bins have unequal widths, relative height does NOT directly give relative frequency. Statement B is incorrect."}, {"num": 5, "graph": null, "stem": "A researcher surveyed 60 Gen X, 80 Millennial, and 120 Gen Z respondents about their preferred streaming service: Platform A or Platform B. Results: Gen X \u2014 A:22, B:38. Millennials \u2014 A:52, B:28. Gen Z \u2014 A:75, B:45.", "question": "Which of the following statements is supported by the table?", "choices": ["The same percentage of Millennials and Gen Z preferred Platform A.", "The percentage of Gen X who preferred Platform B is greater than the percentage of Millennials who preferred Platform B.", "Less than half of non-Millennials preferred Platform A.", "Of those who preferred Platform A, more than half were either Gen X or Millennials.", "Of those who preferred Platform B, more than half were Gen Z."], "answer": 1, "explanation": "Gen X: 38/60 = 63.3% chose B. Millennials: 28/80 = 35% chose B. So Gen X % for B (63.3%) > Millennials % for B (35%). Statement B is correct."}, {"num": 6, "graph": null, "stem": "In a favorite sport survey of 30 AP Statistics students: 6 chose Basketball, 8 chose Soccer, 7 chose Swimming, 3 chose Tennis, and 6 chose Track.", "question": "Among those NOT choosing Basketball or Swimming, what proportion chose Track or Soccer?", "choices": ["(6+8) / (6+7)", "(6+8) / (30\u2212(6+7))", "(6+8) / (30\u2212(6+8))", "(6+8) / 30", "1 \u2212 (6+8) / 30"], "answer": 1, "explanation": "Those not choosing Basketball or Swimming = 30 \u2212 (6+7) = 17. Of those, Track + Soccer = 6+8 = 14. Proportion = 14/17 = (6+8)/(30\u2212(6+7))."}, {"num": 7, "graph": "mc_q7_ogive.png", "stem": "The cumulative relative frequency plot above is shown for a dataset of completion times (minutes).", "question": "To which of the five histograms below does this cumulative relative frequency plot correspond?", "choices": ["(A)", "(B)", "(C)", "(D)", "(E)"], "answer": 1, "explanation": "The ogive rises steeply at first then slowly \u2014 indicating most values are on the lower end with a long right tail. This matches histogram (B), which is right-skewed."}, {"num": 8, "graph": "mc_q8_histogram.png", "stem": "The histogram above shows the distribution of exam scores.", "question": "To which of the five cumulative relative frequency plots below does this histogram correspond?", "choices": ["(A)", "(B)", "(C)", "(D)", "(E)"], "answer": 0, "explanation": "The histogram is symmetric and bell-shaped (normal). Its ogive should be an S-shaped curve \u2014 steep in the middle, flatter at the tails. This matches ogive (A)."}, {"num": 9, "graph": null, "stem": "A dataset has the following five-number summary: Min = 12, Q1 = 25, Median = 40, Q3 = 55, Max = 90.", "question": "Which of the following is true about the distribution?", "choices": ["The distribution is symmetric because Q3 \u2212 Median = Median \u2212 Q1.", "There is definitely at least one outlier on the high end.", "The IQR is 65.", "The range is 78.", "At least 75% of the data values fall between 25 and 90."], "answer": 3, "explanation": "Range = Max \u2212 Min = 90 \u2212 12 = 78. IQR = Q3\u2212Q1 = 30, not 65. Upper fence = 55+1.5(30)=100; Max=90 < 100, so no confirmed outlier. Answer: D."}, {"num": 10, "graph": null, "stem": "The ages of participants in a study are recorded. The mean age is 34 years and the median age is 28 years.", "question": "Which of the following is most likely true about the shape of the distribution?", "choices": ["The distribution is skewed left because the mean is greater than the median.", "The distribution is skewed right because the mean is greater than the median.", "The distribution is symmetric because both measures of center are close.", "The distribution is bimodal because the mean and median differ.", "Nothing can be determined about the shape from the mean and median alone."], "answer": 1, "explanation": "When mean > median, a few high values (right tail) pull the mean upward. This indicates right skew. Answer: B."}];
const FR = [{"num": 1, "title": "Free-Response Question 1 \u2014 Histogram & Cumulative Relative Frequency", "graph1": "fr_q1_histogram.png", "graph2": "fr_q1_ogive.png", "context": "The miles run by 25 randomly selected runners during a given week are given below.", "table": [["Miles run (x)", "5 \u2264 x < 10", "10 \u2264 x < 15", "15 \u2264 x < 20", "20 \u2264 x < 25"], ["Frequency", "3", "11", "7", "4"]], "parts": [["a", "Construct a histogram for the miles run data. Label both axes clearly."], ["b", "What percent of the runners ran fewer than 15 miles?"], ["c", "Construct a cumulative relative frequency plot (ogive) for the data."], ["d", "Using your ogive, estimate the median miles run. Show your work."]], "answers": [["a", "Histogram: bars at [5,10), [10,15), [15,20), [20,25) with heights 3, 11, 7, 4. See graph above."], ["b", "Runners under 15 miles = 3 + 11 = 14. Percent = 14/25 = 56%."], ["c", "Ogive points: (5, 0), (10, 0.12), (15, 0.56), (20, 0.84), (25, 1.00). See graph above."], ["d", "Median is where cumulative relative frequency = 0.50. From the ogive, this falls between 10 and 15 miles, at approximately 13.2 miles. (0.50 \u2212 0.12)/(0.56 \u2212 0.12) \u00d7 5 + 10 \u2248 13.3 miles."]]}, {"num": 2, "title": "Free-Response Question 2 \u2014 Dotplot Analysis", "graph1": "fr_q2_dotplot.png", "graph2": null, "context": "The dotplot above shows the number of goals scored by the 20 teams playing in a city's high school soccer games on a particular day.", "table": null, "parts": [["a", "Describe the distribution of goals scored."], ["b", "One player scored 5 goals, but her team still lost. What are all the possible final scores for that game? Explain your reasoning."], ["c", "Is it possible that all teams scoring exactly 3 goals won their games? Explain."]], "answers": [["a", "The distribution is skewed right with a peak at 1\u20132 goals. The range is 0\u20139. There appear to be potential high outliers at 7, 8, and 9 goals. The center (median) is approximately 3 goals."], ["b", "For the player's team to lose, the opposing team must have scored more than 5 goals. From the dotplot, possible losing scores paired with > 5 goals on the opposing team: the team scored 5, and opponents scored 6, 7, 8, or 9. But scores must be paired \u2014 possible game scores: 5\u20136, 5\u20137, 5\u20138, or 5\u20139 (opponent's score listed second). Note games are paired so these pairs must exist in the dotplot."], ["c", "There are 3 teams that scored exactly 3 goals (from the dotplot). For all three to have won, each opposing team must have scored fewer than 3 goals. There are enough teams with 0, 1, or 2 goals to make this possible, but the games must be validly paired. Yes, it is possible if those 3 teams each played a team scoring 0, 1, or 2 goals."]]}, {"num": 3, "title": "Free-Response Question 3 \u2014 Stemplot Analysis", "graph1": "fr_q3_stemplot.png", "graph2": null, "context": "The team batting averages for a major league baseball team over the past 28 seasons are shown in the stemplot above.", "table": null, "parts": [["a", "Interpret the lowest value in context."], ["b", "Describe the distribution."], ["c", "Give a reason one might argue that the team is more likely to lose a given game than win it."], ["d", "Give a reason one might argue that the team is more likely to win a given game than lose it."]], "answers": [["a", "The lowest value is .223, meaning that in the worst season over the past 28 years, the team's batters got a hit in only about 22.3% of at-bats."], ["b", "The distribution is roughly unimodal and approximately symmetric, centered around .265\u2013.270. The spread runs from .223 to .310. There are no obvious outliers."], ["c", "The majority of batting averages fall below .275, meaning batters fail to get a hit more than 72.5% of at-bats. Since batting average is a key indicator of offensive success, a team that fails to hit more than 3/4 of the time is likely to struggle to score runs."], ["d", "The median batting average is approximately .268, which is above the league average of .250. A team batting above the league average more often has a competitive offensive advantage, suggesting they are more likely to score enough runs to win."]]}, {"num": 4, "title": "Free-Response Question 4 \u2014 Cumulative Relative Frequency Interpretation", "graph1": "fr_q4_ogive.png", "graph2": null, "context": "A college basketball team keeps records of career average points per game of players playing at least 75% of team games. The cumulative relative frequency plot above summarizes statistics of players graduating over the past 10 years.", "table": null, "parts": [["a", "Interpret the point (15, 0.40) in context."], ["b", "Interpret the intersection of the plot with the horizontal axis in context."], ["c", "Interpret the flat section of the plot from 5 to 7 points per game in context."], ["d", "The players with the top 10% of career average points per game will be listed on a plaque. What is the cutoff score for being included on the plaque?"], ["e", "What proportion of players averaged between 12 and 20 points per game?"]], "answers": [["a", "40% of the players who graduated over the past 10 years had a career average of 15 points per game or fewer."], ["b", "The plot meets the horizontal axis at x = 10, meaning that 0% of players averaged fewer than 10 points per game. The minimum career average in this dataset is 10 points per game."], ["c", "No players in this dataset had a career average between 5 and 7 points per game. The flat line indicates cumulative frequency stays at 0% \u2014 no values fall in that interval."], ["d", "The top 10% corresponds to the 90th percentile, where cumulative relative frequency = 0.90. Reading from the ogive, the 90th percentile is approximately 24 points per game. Players must average more than ~24 points per game to be on the plaque."], ["e", "Cumulative relative frequency at 20 pts \u2248 0.78. Cumulative relative frequency at 12 pts \u2248 0.20. Proportion between 12 and 20 = 0.78 \u2212 0.20 = 0.58, or about 58%."]]}];

const letters = ['A','B','C','D','E'];

function buildQuiz() {
  const main = document.getElementById('quizMain');
  main.innerHTML = '';

  // MC Section
  const mcSec = document.createElement('div');
  mcSec.innerHTML = `<div class="section-header"><h2>Multiple Choice</h2><p>Select one answer per question</p></div>`;
  main.appendChild(mcSec);

  MC.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card'; card.id = `card-${qi}`;

    const hdr = document.createElement('div'); hdr.className = 'q-header';
    hdr.innerHTML = `<span class="q-num">${qi+1}</span><span class="q-badge">Multiple Choice</span><span class="q-status" id="status-${qi}"></span>`;
    card.appendChild(hdr);

    if (q.graph && IMAGES[q.graph]) {
      const gd = document.createElement('div'); gd.className = 'q-graph';
      gd.innerHTML = `<img src="${IMAGES[q.graph]}" alt="graph">`;
      card.appendChild(gd);
    }

    const body = document.createElement('div'); body.className = 'q-body';
    body.innerHTML = (q.stem ? `<p class="q-stem">${q.stem}</p>` : '') + `<p class="q-question">${q.question}</p>`;
    card.appendChild(body);

    const cd = document.createElement('div'); cd.className = 'choices';
    q.choices.forEach((text, ci) => {
      const btn = document.createElement('div');
      btn.className = 'choice'; btn.dataset.qi = qi; btn.dataset.ci = ci;
      btn.innerHTML = `<span class="choice-letter">${letters[ci]}</span><span>${text}</span>`;
      btn.addEventListener('click', () => handleChoice(qi, ci));
      cd.appendChild(btn);
    });
    card.appendChild(cd);

    // Extra histogram grid for Q7 / ogive grid for Q8
    if (qi === 6 && Q7_HIST) {
      const eg = document.createElement('div'); eg.className = 'extra-graph';
      eg.innerHTML = `<img src="${Q7_HIST}" alt="Five histograms"><p class="extra-graph-label">Five histograms — choose which matches the ogive above</p>`;
      card.appendChild(eg);
    }
    if (qi === 7 && Q8_OGIVE) {
      const eg = document.createElement('div'); eg.className = 'extra-graph';
      eg.innerHTML = `<img src="${Q8_OGIVE}" alt="Five ogives"><p class="extra-graph-label">Five cumulative relative frequency plots — choose which matches the histogram above</p>`;
      card.appendChild(eg);
    }

    const exp = document.createElement('div'); exp.className = 'explanation'; exp.id = `exp-${qi}`;
    card.appendChild(exp);
    main.appendChild(card);
  });

  // Results (MC)
  const res = document.createElement('div'); res.id = 'results';
  res.innerHTML = `<h2>Multiple Choice Complete!</h2><div class="score-big" id="finalScore"></div><p id="finalMsg"></p><button class="btn-reset" onclick="resetMC()">Try Again</button>`;
  main.appendChild(res);

  // FR Section
  const frSec = document.createElement('div');
  frSec.innerHTML = `<div class="section-header" style="margin-top:1rem"><h2>Free Response</h2><p>Show all work · Reveal answers when ready</p></div>`;
  main.appendChild(frSec);

  FR.forEach((q, qi) => {
    const card = document.createElement('div'); card.className = 'fr-card';

    const hdr = document.createElement('div'); hdr.className = 'fr-header';
    hdr.innerHTML = `<h3>${q.title}</h3><span class="fr-badge">Free Response</span>`;
    card.appendChild(hdr);

    const gd = document.createElement('div'); gd.className = 'fr-graph';
    if (q.graph1 && IMAGES[q.graph1]) gd.innerHTML += `<img src="${IMAGES[q.graph1]}" alt="graph">`;
    if (q.graph2 && IMAGES[q.graph2]) gd.innerHTML += `<img src="${IMAGES[q.graph2]}" alt="graph">`;
    if (gd.innerHTML) card.appendChild(gd);

    const body = document.createElement('div'); body.className = 'fr-body';
    body.innerHTML = `<p class="fr-context">${q.context}</p>`;
    if (q.table) {
      let tbl = '<table class="fr-table"><tr>';
      q.table[0].forEach(h => tbl += `<th>${h}</th>`);
      tbl += '</tr><tr>';
      q.table[1].forEach(d => tbl += `<td>${d}</td>`);
      tbl += '</tr></table>';
      body.innerHTML += tbl;
    }
    card.appendChild(body);

    const parts = document.createElement('div'); parts.className = 'fr-parts';
    q.parts.forEach(([label, text], pi) => {
      const part = document.createElement('div'); part.className = 'fr-part';
      const ansText = q.answers[pi][1];
      part.innerHTML = `
        <div class="fr-part-label">Part (${label})</div>
        <div class="fr-part-q">${text}</div>
        <div class="fr-answer" id="fr-ans-${qi}-${pi}"><strong>Answer:</strong> ${ansText}</div>
        <button class="show-answer-btn" onclick="toggleAns('fr-ans-${qi}-${pi}', this)">Show Answer</button>`;
      parts.appendChild(part);
    });
    card.appendChild(parts);
    main.appendChild(card);
  });
}

function handleChoice(qi, ci) {
  const card = document.getElementById(`card-${qi}`);
  if (card.classList.contains('answered-correct') || card.classList.contains('answered-wrong')) return;
  const q = MC[qi];
  const allChoices = card.querySelectorAll('.choice');
  allChoices.forEach(c => c.classList.add('disabled'));
  const isCorrect = ci === q.answer;
  if (isCorrect) correct++;
  answered++;
  allChoices[ci].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) allChoices[q.answer].classList.add('reveal-correct');
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
  const status = document.getElementById(`status-${qi}`);
  status.textContent = isCorrect ? '✓' : '✗';
  status.style.color = isCorrect ? 'var(--green)' : 'var(--red)';
  const exp = document.getElementById(`exp-${qi}`);
  exp.style.display = 'block';
  if (isCorrect) {
    exp.innerHTML = `<strong>Correct!</strong> ${q.explanation}`;
  } else {
    exp.classList.add('wrong-exp');
    exp.innerHTML = `<strong>Incorrect.</strong> Correct answer: <strong>${letters[q.answer]}</strong>. ${q.explanation}`;
  }
  updateProgress();
  if (answered === MC.length) setTimeout(showResults, 600);
}

function updateProgress() {
  const pct = (answered / MC.length * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `MC: ${answered} / ${MC.length}`;
  document.getElementById('scorePill').textContent = `Score: ${correct}`;
}

function showResults() {
  const res = document.getElementById('results');
  res.style.display = 'block';
  const pct = Math.round(correct / MC.length * 100);
  document.getElementById('finalScore').textContent = `${correct} / ${MC.length}`;
  const msg = pct >= 90 ? 'Excellent! Outstanding mastery of data analysis.' :
              pct >= 70 ? 'Great work! Strong understanding of statistical graphs.' :
              pct >= 50 ? 'Good effort. Review the questions you missed.' :
                          'Keep studying — revisit each graph type carefully.';
  document.getElementById('finalMsg').textContent = msg + ` (${pct}%)`;
  res.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetMC() {
  answered = 0; correct = 0;
  updateProgress();
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleAns(id, btn) {
  const el = document.getElementById(id);
  if (el.style.display === 'block') {
    el.style.display = 'none'; btn.textContent = 'Show Answer';
  } else {
    el.style.display = 'block'; btn.textContent = 'Hide Answer';
  }
}

buildQuiz();
</script>
</body>
</html>
